name: Deploy Shiny to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      
      - name: Install packages
        run: |
          install.packages(c("shiny", "shinylive"))
        shell: Rscript {0}
        
      - name: Build Shinylive App
        run: |
          shinylive::export(appdir = ".", destdir = "_site")
        shell: Rscript {0}
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
